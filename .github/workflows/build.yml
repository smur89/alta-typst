name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Single source of truth for the Typst version used across all jobs.
  # Bumping this requires no other edits.
  TYPST_VERSION: v0.14.2
  # Package name as it appears in typst.toml's `package.name`. Surfaced
  # here so branch names, tarball names, PR titles, and the supersede
  # filter all derive from one place; rename the package by editing
  # both this and typst.toml.
  PACKAGE_NAME: altacv

jobs:
  # Syntax + manifest sanity check. Compiles lib.typ and the example
  # against the local file tree (no installation).
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Typst + Lato font
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-lato
          TARBALL=typst-x86_64-unknown-linux-musl.tar.xz
          URL=https://github.com/typst/typst/releases/download/${TYPST_VERSION}/$TARBALL
          curl -sSfL "$URL" | sudo tar -xJ \
            --strip-components=1 \
            -C /usr/local/bin \
            typst-x86_64-unknown-linux-musl/typst

      - name: Compile example + test fixtures
        run: make test

      # Re-render every fixture under examples/tests/ and fail if any
      # committed PDF is out of date. Keeps the visible reference in
      # lockstep with the .typ source.
      - name: Verify examples/tests/*.pdf are in sync
        run: |
          make test-pdfs
          if ! git diff --quiet --exit-code -- examples/tests; then
            echo "::error::examples/tests/*.pdf is out of date — run 'make test-pdfs' locally and commit the result"
            git --no-pager diff --stat -- examples/tests
            exit 1
          fi

  # Build the example PDF and a first-page preview PNG. Uploaded as
  # workflow artifacts on every run so reviewers can download and
  # inspect the rendered output without checking it out locally.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Typst + Lato font
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-lato
          TARBALL=typst-x86_64-unknown-linux-musl.tar.xz
          URL=https://github.com/typst/typst/releases/download/${TYPST_VERSION}/$TARBALL
          curl -sSfL "$URL" | sudo tar -xJ \
            --strip-components=1 \
            -C /usr/local/bin \
            typst-x86_64-unknown-linux-musl/typst

      - name: Build example.pdf + example_full.pdf + preview.png
        run: make example example-full

      - name: Upload example.pdf
        uses: actions/upload-artifact@v7
        with:
          name: example-pdf
          path: examples/example.pdf
          retention-days: 30
          if-no-files-found: error

      - name: Upload example_full.pdf
        uses: actions/upload-artifact@v7
        with:
          name: example-full-pdf
          path: examples/example_full.pdf
          retention-days: 30
          if-no-files-found: error

      - name: Upload preview.png
        uses: actions/upload-artifact@v7
        with:
          name: preview-png
          path: examples/preview.png
          retention-days: 30
          if-no-files-found: error

  # release-please reads conventional-commit messages since the last
  # tag, opens (or updates) a Release PR with the bumped version, and
  # — when that PR is merged — cuts the tag + GitHub Release.
  #
  # The release-please-config.json declares typst.toml's
  # `package.version` field as an extra-file, so the manifest version
  # stays in lockstep with the released tag automatically.
  release-please:
    needs: [lint, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Runs only on the workflow run where release-please just created a
  # release. Builds a `altacv-<version>.tar.gz` containing the package
  # files that should be submitted to typst/packages (typst.toml,
  # lib.typ, icons/, LICENSE, README.md) and attaches it to the
  # release alongside example.pdf and preview.png.
  attach-release-artifacts:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Typst + Lato font
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-lato
          TARBALL=typst-x86_64-unknown-linux-musl.tar.xz
          URL=https://github.com/typst/typst/releases/download/${TYPST_VERSION}/$TARBALL
          curl -sSfL "$URL" | sudo tar -xJ \
            --strip-components=1 \
            -C /usr/local/bin \
            typst-x86_64-unknown-linux-musl/typst

      - name: Rebuild example.pdf + example_full.pdf + preview.png at the tag
        run: make example example-full

      # The tarball contains exactly the files that go into
      # typst/packages/preview/<PACKAGE_NAME>/<version>/. Everything else
      # (CI, examples, .gitignore) is repo-only and intentionally
      # excluded from the package payload.
      #
      # `internal/` and `sections/` carry the modules that lib.typ
      # `#import`s; they must ship with the package or compile fails
      # at the user's site with "file not found".
      #
      # `template/` provides the starter project that `typst init
      # @preview/altacv` copies to the user; `thumbnail.png` is the
      # image Typst Universe displays on the package card. Both are
      # referenced from typst.toml's `[template]` section and must
      # ship with the package or the linter reports them missing.
      - name: Build package tarball
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          tar czf "${PACKAGE_NAME}-${VERSION}.tar.gz" \
            typst.toml lib.typ internal/ sections/ icons/ template/ \
            thumbnail.png LICENSE README.md

      - name: Attach assets to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            ${{ env.PACKAGE_NAME }}-*.tar.gz
            examples/example.pdf
            examples/example_full.pdf
            examples/preview.png
          make_latest: 'true'

  # When release-please cuts a new tag, automatically open a PR on
  # typst/packages submitting altacv:<version> to Typst Universe. The
  # PR is created from a maintainer-owned fork (smur89/packages),
  # branched off the current typst/packages main so the diff is just
  # the new package directory.
  #
  # Prerequisites (one-time setup):
  #   1. Fork github.com/typst/packages to smur89/packages.
  #   2. Create a fine-grained PAT at github.com/settings/personal-access-tokens
  #      scoped to smur89/packages, with:
  #        - Contents: Read and write    (push the branch)
  #        - Pull requests: Read and write  (open the cross-repo PR)
  #      Cross-repo PRs into public typst/packages do not require any
  #      permission on typst/packages itself — read is implicit.
  #   3. Store the PAT as a repository secret named TYPST_UNIVERSE_TOKEN
  #      on smur89/alta-typst.
  #
  # The job is idempotent: re-running for an already-submitted version
  # detects the existing PR, captures its URL, and skips creation.
  # Older `altacv:*` PRs we own are then auto-closed with a supersede
  # comment pointing at the current submission — the typst/packages
  # review queue runs slower than this repo's release cadence, so
  # stacking version PRs wastes reviewer time and merges stale bugs.
  submit-to-typst-universe:
    needs: [release-please, attach-release-artifacts]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # All write operations target external repos (smur89/packages and
    # typst/packages) via TYPST_UNIVERSE_TOKEN, so no permissions on
    # the workflow repo itself are needed.
    permissions: {}
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
      TAG: ${{ needs.release-please.outputs.tag_name }}
      FORK_REPO: smur89/packages
      UPSTREAM_REPO: typst/packages
      GH_TOKEN: ${{ secrets.TYPST_UNIVERSE_TOKEN }}
    steps:
      - name: Skip if a PR for this version is already open
        id: check
        run: |
          # Filter by head branch (one branch per version) rather than
          # title-substring search — GitHub's search syntax interprets
          # `altacv:` as an unknown filter qualifier and returns nothing
          # useful for a title containing a colon.
          existing=$(gh pr list \
            --repo "$UPSTREAM_REPO" \
            --head "${FORK_REPO%%/*}:${PACKAGE_NAME}-${VERSION}" \
            --state open \
            --json url --jq '.[0].url // empty')
          if [ -n "$existing" ]; then
            echo "PR already open: $existing — skipping submission"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            # Surface the existing URL so the supersede step below can
            # reference *this* version's PR regardless of whether we
            # created it on this run or a previous one.
            echo "pr_url=$existing" >> "$GITHUB_OUTPUT"
          fi

      # Sparse-checkout the PR-body template; full checkout would
      # pull lib.typ and icons we don't need in this job. The body
      # uses the slim "update" variant of typst/packages' PR
      # template — the first submission of altacv was opened
      # manually, so this job only ever opens version-bump PRs.
      - name: Checkout PR body template
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          sparse-checkout: .github/typst-universe-pr-body.md
          sparse-checkout-cone-mode: false

      - name: Configure git
        if: steps.check.outputs.skip != 'true'
        run: |
          gh auth setup-git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # `gh repo clone` of a fork auto-configures an `upstream` remote
      # pointing at the parent and fetches its default branch, so an
      # explicit `git remote add upstream` would collide ("remote
      # upstream already exists"). The fork mirrors all of
      # typst/packages (~70k files); `--depth=1` keeps the clone fast
      # and we don't need history to branch off upstream/main.
      - name: Clone fork (gh auto-adds upstream remote), branch off upstream/main
        if: steps.check.outputs.skip != 'true'
        run: |
          gh repo clone "$FORK_REPO" pkg -- --no-tags --depth=1
          cd pkg
          git checkout -b "${PACKAGE_NAME}-${VERSION}" upstream/main

      - name: Add package files from the release tarball
        if: steps.check.outputs.skip != 'true'
        env:
          SERVER_URL: ${{ github.server_url }}
        run: |
          cd pkg
          PKG_DIR="packages/preview/${PACKAGE_NAME}/${VERSION}"
          mkdir -p "$PKG_DIR"
          curl -sSfL \
            "${SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${TAG}/${PACKAGE_NAME}-${VERSION}.tar.gz" \
            | tar xz -C "$PKG_DIR"
          git add "$PKG_DIR"
          git commit -m "${PACKAGE_NAME}:${VERSION}"

      # `--force` because the branch is auto-generated per version and
      # only this workflow ever pushes to it — overwriting stale state
      # from a partially-failed prior run (branch pushed, PR creation
      # later failed) is the desired behaviour. Without it, re-runs
      # fail with "fetch first" once any previous attempt got past the
      # push step.
      - name: Push branch to fork
        if: steps.check.outputs.skip != 'true'
        run: |
          cd pkg
          git push --force origin "${PACKAGE_NAME}-${VERSION}"

      # envsubst is restricted to the expected variable names so any
      # incidental $-references in the template (e.g. a stray $PATH)
      # are not silently expanded.
      - name: Open PR upstream
        id: open
        if: steps.check.outputs.skip != 'true'
        run: |
          cd pkg
          # `gh pr create` ordinarily prints just the URL, but some
          # versions also emit a "Creating pull request for X into Y"
          # preamble line first. `tail -n 1` keeps the capture robust
          # across either format.
          new_pr_url=$(envsubst '${VERSION} ${TAG} ${GITHUB_REPOSITORY}' \
            < "$GITHUB_WORKSPACE/.github/typst-universe-pr-body.md" \
            | gh pr create \
                --repo "$UPSTREAM_REPO" \
                --base main \
                --head "${FORK_REPO%%/*}:${PACKAGE_NAME}-${VERSION}" \
                --title "${PACKAGE_NAME}:${VERSION}" \
                --body-file - \
            | tail -n 1)
          echo "Opened: $new_pr_url"
          echo "pr_url=$new_pr_url" >> "$GITHUB_OUTPUT"

      # The typst/packages review queue moves slower than releases here
      # — a v1.0.0 submission can sit pending while v1.1.0 is ready
      # to go. Once a *newer* submission is open, the older one is
      # stale (its bugs are fixed in the newer release, and merging
      # both wastes reviewer time). We close every other open
      # ${PACKAGE_NAME}:* PR we own with a supersede comment pointing
      # at the current one. Runs regardless of whether this run
      # *created* the current PR or detected it from a previous run,
      # so a retried workflow still tidies up stragglers.
      #
      # Safety:
      #   - `--author "@me"` scopes to PRs opened by the PAT identity
      #     (whoever owns TYPST_UNIVERSE_TOKEN), so we never touch
      #     anyone else's submissions even in the unlikely case of a
      #     name collision. **Caveat**: rotating TYPST_UNIVERSE_TOKEN
      #     to a different account orphans PRs opened under the old
      #     identity from this filter — close those manually if a
      #     rotation happens while prior-version PRs are still open.
      #   - Filtering on the head branch starting with `${PACKAGE_NAME}-`
      #     is a belt-and-braces check against any non-package PR the
      #     bot might also have opened against typst/packages.
      #   - We exclude `${PACKAGE_NAME}-${VERSION}` (the current
      #     submission) from the close list so it survives.
      - name: Supersede earlier package PRs
        env:
          CURRENT_PR_URL: ${{ steps.check.outputs.pr_url || steps.open.outputs.pr_url }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          # GHA's default shell for `run:` is `bash --noprofile --norc
          # -eo pipefail {0}`, so a `gh` failure on the upstream side
          # of the `| jq` pipe aborts the step. `jq -r --arg cur` is
          # quote-safe regardless of what release-please ever emits as
          # the version string. `--limit 100` defeats the 30-item gh
          # default — a long upstream review hiatus could otherwise let
          # stragglers slip past unseen.
          stale=$(gh pr list \
            --repo "$UPSTREAM_REPO" \
            --author "@me" \
            --state open \
            --limit 100 \
            --json number,headRefName \
            | jq -r --arg cur "${PACKAGE_NAME}-${VERSION}" --arg prefix "${PACKAGE_NAME}-" \
                '.[] | select(.headRefName | startswith($prefix)) | select(.headRefName != $cur) | .number')
          if [ -z "$stale" ]; then
            echo "No older ${PACKAGE_NAME} submissions open — nothing to supersede."
            exit 0
          fi
          release_notes="${SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          body="Closing in favour of \`${PACKAGE_NAME}:${VERSION}\` at ${CURRENT_PR_URL}. The newer release supersedes this submission — see the [release notes](${release_notes}) for the cumulative changes."
          # Tolerate per-PR close failures (e.g. someone manually closed
          # one between the list and now): log and continue rather than
          # aborting the batch and leaving the rest open until the next
          # release happens by.
          for pr in $stale; do
            if gh pr close "$pr" --repo "$UPSTREAM_REPO" --comment "$body"; then
              echo "Superseded PR #$pr"
            else
              echo "::warning::Could not close PR #$pr (already closed, or transient error) — continuing"
            fi
          done
